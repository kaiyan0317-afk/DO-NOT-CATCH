workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Install Unity via Unity Hub
        script: |
          # 1. Unity Hub CLIを使って、指定のバージョンをインストール
          # CodemagicのMacインスタンスにはUnity Hubが標準搭載されています
          unity-hub install --version 2022.3.62f3 --changeset 27b94a500b46 --module android
      - name: Build Android
        script: |
          # 2. インストールしたUnityのパスを直接叩いてビルド
          /Applications/Unity/Hub/Editor/2022.3.62f3/Unity.app/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -projectPath DWeb/FISHTARGET \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout
    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
