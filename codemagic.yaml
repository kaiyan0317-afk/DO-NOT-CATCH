workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 180  # インストール＋ビルドで余裕持たせとく
    environment:
      unity: 2022.3.62f2  # これで自動インストール成功するはず（f3じゃなくてf2！）
    scripts:
      - name: Build Android
        script: |
          # UNITY_HOME はCodemagicが自動でセットしてくれる
          # 念のためechoで確認（ログで見れる）
          echo "Using Unity at: $UNITY_HOME"

          "$UNITY_HOME/Contents/MacOS/Unity" \
            -batchmode \
            -quit \
            -nographics \
            -projectPath "DWeb/FISHTARGET" \
            -executeMethod BuildScript.BuildAndroid
            # ↑ -logFile は削除！ これで "Unable to open log file" 回避
            # UnityのログはCodemagicが自動でビルドログにキャプチャしてくれる

    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk  # 出力APK
      - "**/*.log"                           # UnityのEditor.logとか全部取っとく
      - "**/build.log"                       # 念のため

    # 必要ならpublishing追加（Google Playとか）
    # publishing:
    #   google_play:
    #     ...
