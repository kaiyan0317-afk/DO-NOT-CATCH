workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Install Unity
        script: |
          # 1. ツールをインストール（--userを外してシステム側に入れます）
          pip install codemagic-cli-tools
          
          # 2. インストールされた実行ファイルの場所を直接叩く
          # pyenv環境下での標準的なパスを直接指定します
          /Users/builder/.pyenv/versions/3.12.7/bin/unity-installer install --version 2022.3.62f3 --components android
      - name: Build Android
        script: |
          # インストール先を確認して実行
          /Applications/Unity/Hub/Editor/2022.3.62f3/Unity.app/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -projectPath DWeb/FISHTARGET \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout
    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
