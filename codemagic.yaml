workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    # ここを追加・修正
    environment:
      unity: 2022.3.62f3
    scripts:
      - name: Build Android
        script: |
          # $UNITY_BIN は環境変数として自動セットされます
          $UNITY_BIN -batchmode -quit -projectPath DWeb/FISHTARGET -executeMethod BuildScript.BuildAndroid -logFile /dev/stdout
    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
