workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 120  # インストール時間考えて長めに
    environment:
      unity: 2022.3.62f2     # ← ここをf3 → f2 に変更！
    scripts:
      - name: Build Android
        script: |
          "$UNITY_HOME/Contents/MacOS/Unity" \
            -batchmode \
            -quit \
            -nographics \
            -projectPath "DWeb/FISHTARGET" \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout
    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
      - build.log  # ログ残したいなら追加
