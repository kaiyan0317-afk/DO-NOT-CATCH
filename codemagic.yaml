workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Install Unity
        script: |
          # 1. ツールをインストール
          pip install codemagic-cli-tools
          
          # 2. インストール先を強制的にパスに追加し、コマンドを叩く
          export PATH=$PATH:$(python3 -m site --user-base)/bin
          unity-installer install --version 2022.3.62f3 --components android
      - name: Build Android
        script: |
          # インストール先を確認して実行
          /Applications/Unity/Hub/Editor/2022.3.62f3/Unity.app/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -projectPath DWeb/FISHTARGET \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout
    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
