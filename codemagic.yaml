workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 120  # ← ここを120に変更！ これでエラー消える
    environment:
      unity: 2022.3.62f2  # 自動インストールで確実
    scripts:
      - name: Build Android
        script: |
          # UNITY_HOME はCodemagicが自動セット
          echo "Using Unity at: $UNITY_HOME"

          "$UNITY_HOME/Contents/MacOS/Unity" \
            -batchmode \
            -quit \
            -nographics \
            -projectPath "DWeb/FISHTARGET" \
            -executeMethod BuildScript.BuildAndroid
            # -logFile なしで "Unable to open log file" 回避

    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
      - "**/*.log"          # Editor.log とか取れる
      - "**/build.log"      # 追加でログ確保

    # 必要なら triggering: とか追加（デフォルトでmainブランチpushで動く）
