workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 120           # インストールで時間かかるので長めに
    integrations:
      unity:
        version: 2022.3.62f2        # ← ここをf2にしてみる（f3→f2はほぼ互換性あり）
        # または version: 2022.3.47f1 でもOK（安定してる）
    scripts:
      - name: Build Android
        script: |
          "$UNITY_HOME/Contents/MacOS/Unity" \
            -batchmode \
            -quit \
            -nographics \
            -projectPath "DWeb/FISHTARGET" \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout
    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
      # 必要ならログもartifactに
      - build.log
