 - name: Install specific Unity 2022.3.62f3
        script: |
          # Unity Hub CLIを使ってインストール
          # まずchangesetが必要 → 公式リリースノートから探すか、以下のように指定
          UNITY_VERSION="2022.3.62f3"
          # changesetはUnityのリリースページから確認（例: https://unity.com/releases/editor/whats-new/2022.3.62 みたいなページ）
          # 仮に changeset が abc123def だった場合
          yes | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub \
            -- --headless install \
            --version $UNITY_VERSION \
            --changeset YOUR_CHANGESET_HERE \
            -a arm64

          # Androidモジュールも入れる場合
          yes | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub \
            -- --headless install --version $UNITY_VERSION --changeset YOUR_CHANGESET_HERE \
            --install-location "/Applications/Unity/Hub/Editor" \
            -m Android

          echo "UNITY_HOME=/Applications/Unity/Hub/Editor/$UNITY_VERSION/Unity.app" >> $CM_ENV
