workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Install Unity
        script: |
          # 1. codemagic公式ツールを「確実に実行できる場所」にインストール
          pip install codemagic-cli-tools
          
          # 2. pythonから直接ツールを呼び出す（これが一番確実です）
          python3 -m codemagic_cli_tools.unity.installer install --version 2022.3.62f3 --components android
      - name: Build Android
        script: |
          # 3. インストールされたUnityを探して実行
          # $UNITY_BIN が使えない場合に備え、フルパスで指定します
          /Applications/Unity/Hub/Editor/2022.3.62f3/Unity.app/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -projectPath DWeb/FISHTARGET \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout
    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
