workflows:
  unity-android-build:
    name: Unity Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Install Unity
        script: |
          # 指定したバージョンのUnityをインストールする魔法のコマンド
          pip install unity-tools
          unity-tools install --version 2022.3.62f3 --components android
      - name: Build Android
        script: |
          # インストールしたUnityを使ってビルド
          UNITY_BIN="/Applications/Unity/Hub/Editor/2022.3.62f3/Unity.app/Contents/MacOS/Unity"
          $UNITY_BIN -batchmode -quit -projectPath DWeb/FISHTARGET -executeMethod BuildScript.BuildAndroid -logFile /dev/stdout
    artifacts:
      - DWeb/FISHTARGET/build/android/*.apk
